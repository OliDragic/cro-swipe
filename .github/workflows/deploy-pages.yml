# Deployt Cro Swipe als statische App auf GitHub Pages.
# Einmalig nötig: Settings → Pages → Source = "GitHub Actions"
name: Deploy Cro Swipe to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Aktiviert Pages automatisch, falls noch nicht geschehen
      - name: Enable / configure GitHub Pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r src/. _site/
          cp -r audio _site/audio
          cp -r content _site/content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
